apiVersion: aof-s/v1
kind: SemanticLayer
metadata:
  name: Noosystem Semantic Layer (NSL)
  version: "1.0"
  description: >
    The NSL is a value-added extension over A2A and MCP that resolves 
    semantic isolation between agents. It is not a new protocol, but a 
    set of metadata, handshake mechanisms, and learned contracts that 
    travel over existing communication channels.
spec:
  # ── Foundation ──
  foundation:
    extends: ["A2A", "MCP"]
    transport: "SLIM (AGNTCY)"
    description: >
      NSL metadata travels in A2A task headers and MCP tool contexts.
      It adds semantic alignment, trust scoring, and contract learning
      without imposing rigidity on the transport layer.

  # ── Semantic Handshake ──
  semantic_handshake:
    description: >
      Before executing a collaborative task, two agents negotiate the 
      meaning of key concepts using their declared ontology bindings.
    flow:
      - step: 1
        action: >
          Agent A sends a task request to Agent B, including its 
          semantic_profile (namespace and ontology_binding).
      - step: 2
        action: >
          Agent B compares the received profile against its own.
      - step: 3
        action: >
          If both share at least one ontology for the task domain, the 
          handshake succeeds and execution proceeds.
      - step: 4
        action: >
          If no common ontology exists, agents may request human 
          intervention, use an external alignment service, or reject 
          the task with a semantic error.
    configuration: "ASA.yaml (collaboration.semantic_profile)"

  # ── Trust Score ──
  trust_score:
    description: >
      Each agent has a dynamic trust_score (0.0 to 1.0) reflecting its 
      operational reliability. The score is calculated by combining 
      multiple factors with configurable weights.
    calculation:
      hypothesis_precision:
        weight: 0.40
        description: "Ratio of validated vs. falsified hypotheses"
      response_reliability:
        weight: 0.30
        description: "Success rate in capability invocations"
      latency_compliance:
        weight: 0.15
        description: "Adherence to declared SLAs"
      peer_feedback:
        weight: 0.15
        description: "Evaluations received from other agents after collaborations"
    thresholds:
      high_trust: 0.90
      trusted: 0.70
      observed: 0.50
      untrusted: "below 0.50 (agent is isolated)"
    storage: "registry.yaml (maintained by N3 Orchestrator)"

  # ── Namespaces ──
  namespaces:
    description: >
      Noosystemic namespaces isolate sub-ecosystems and prevent semantic 
      collisions between domains.
    format: "noos://<organization>/<domain>/<subdomain>"
    examples:
      - "noos://hospital-pinar/cardiology/icu"
      - "noos://port-havana/logistics/containers"
      - "noos://ecommerce/checkout"
    federation:
      description: >
        Agents in different namespaces can collaborate if explicitly 
        configured via federation policies.

  # ── Learned Semantic Contracts ──
  learned_contracts:
    description: >
      Extension of NSL that allows agents to learn patterns of success 
      in semantic negotiations and store them for future interactions.
    storage: "memory/semantic/learned_contracts.yaml"
    fields:
      - contract_id
      - success_rate
      - preferred_ontology
      - fallback_ontology
      - negotiation_strategy
      - last_negotiated
    example:
      contract_id: "PCI_DSS_v4_compliance"
      success_rate: 0.96
      preferred_ontology: "PCI_DSS_v4"
      fallback_ontology: "ISO_27001"
      negotiation_strategy: "strict_then_fallback"
      last_negotiated: "2026-06-07T10:00:00Z"

  # ── OSI Bridge ──
  osi_bridge:
    description: >
      Adapter that converts NSL semantic profiles to OSI (Open Semantic 
      Interchange) definitions and vice versa, enabling interoperability 
      with the ThoughtSpot and Snowflake ecosystem.
    configuration: "Noosfile (semantic_bridge: 'osi')"
    protocol_stack: ["SLIM", "A2A", "NSL-OSI"]

  # ── Security ──
  security:
    description: >
      NSL assumes the communication channel is already secured by the 
      T2 Zero Trust fabric (SPIFFE + mTLS). The trust_score is an 
      operational reliability metric, not a security credential. Actual 
      authorization is managed by OPA policies in the Noosfile.
    note: >
      The semantic handshake does not replace authentication; it 
      complements it by adding a semantic alignment layer.