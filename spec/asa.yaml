apiVersion: aof-s/v1
kind: AgentModel
metadata:
  name: Adaptive Systemic Agent (ASA)
  version: "1.0"
  description: >
    Formal specification of the Adaptive Systemic Agent architecture.
    Defines a three-level progressive agency model with reflexive causal 
    intervention, probabilistic causal reasoning, multi-type memory, and 
    neuro-symbolic verification.
spec:
  philosophy:
    principle: >
      Reflexive Causal Intervention: Every intervention is formulated as a 
      hypothesis of its effects, executed under security policies, evaluated 
      against reality, and used to update the world model and, at higher 
      levels, the agent's own reasoning strategies.
  levels:
    - level: 1
      name: Reactive
      memory:
        persistent: false
        types: []
        collective: true          # evaluations feed collective memory
      cycle: [startup, reason, execute, evaluate]
      closure: systemic           # via collective memory accessible to N2/N3
      context_tokens: "~2-4k"
      deployment: [edge, local-cpu]
    - level: 2
      name: Systemic
      memory:
        persistent: true
        types: [episodic, semantic, procedural]
        collective_consumer: true # consumes collective memory
      cycle: [startup, reason, hypothesize, execute, evaluate, reflect]
      closure: local              # updates own state
      context_tokens: "~4-7k"
      deployment: [local-gpu, cloud-optional]
    - level: 3
      name: Orchestrated
      memory:
        persistent: true
        types: [episodic, semantic, procedural, meta-cognitive]
        collective_consumer: true
      cycle: [startup, reason, hypothesize, verify, execute, evaluate, reflect]
      closure: local+systemic     # updates own state and can rewrite global rules
      context_tokens: "~7-12k"
      deployment: [local-gpu, cluster]
      capabilities:
        - neuro_symbolic_verification
        - meta_cognition
        - multi_agent_orchestration
        - causal_simulation
  cycle_phases:
    - id: startup
      description: >
        Load AOF‑S artifacts (manifest, context, mission), world model state,
        and constitution.
    - id: reason
      description: >
        Contextualization and inference. Depth varies by level:
        N1 – basic inference; N2 – memory-augmented reasoning;
        N3 – meta-cognitive strategy selection.
    - id: hypothesize
      description: >
        Formulate a causal hypothesis with probabilistic predictions of 
        1st, 2nd, and 3rd order effects. Uses the Causal Graph.
    - id: verify
      description: >
        (N3 only) Symbolic validation of the hypothesis using a rule engine
        (CLIPS/Drools) against semantic contracts and security policies.
    - id: execute
      description: >
        Monitored execution of the action plan with a loop watchdog.
    - id: evaluate
      description: >
        Record structured metrics, detect anomalies, and compare actual
        results with the hypothesis.
    - id: reflect
      description: >
        Update the Causal Graph distributions, extract/refine semantic rules,
        update procedural policies, and (N3) update meta-cognitive memory
        with the performance of the reasoning strategy used.
  memory:
    episodic:
      description: Temporal sequence of interventions and outcomes.
      storage: "YAML/Markdown files with optional vector backend"
    semantic:
      description: >
        Extracted rules and domain facts with forgetting mechanisms
        (confidence, last_accessed, access_count, decay_rate).
      storage: "learned_rules.yaml"
    procedural:
      description: Action policies for automated rapid responses.
      storage: "policies.yaml"
    meta_cognitive:
      description: >
        (N3) Historical performance of reasoning strategies (CoT, ToT, etc.)
        with success rate, latency, and applicable domains.
      storage: "meta_strategies.yaml"
    collective:
      description: >
        Shared memory of evaluations produced by Reactive (N1) agents,
        accessible for Systemic (N2) and Orchestrated (N3) agents.
      storage: "collective_memory endpoint (registry)"
  principles:
    - id: 0
      name: Local-First by Design
      description: >
        Local execution is the default path. Cloud is an optional fallback.
    - id: 1
      name: Cognitive Separation
      description: Each file answers a precise cognitive question.
    - id: 2
      name: Progressive Context Loading
      description: >
        Context is exposed only according to the current cycle phase,
        optimizing token usage.
    - id: 3
      name: Reflexive Causal Intervention
      description: >
        Every action is a hypothesis that is verified, executed under policy,
        and reflected upon.
    - id: 4
      name: Purposeful Cognitive Memory
      description: >
        Memory is not a flat log; it forgets, strengthens, and consolidates
        knowledge over time.
    - id: 5
      name: Zero Trust Security by Construction
      description: >
        SPIFFE identities, mTLS, and OPA policies are integrated from the
        design, not added as a layer.
    - id: 6
      name: Integrated Evaluability
      description: >
        Metrics, benchmark suites, and evaluation commands are first-class
        citizens of the agent lifecycle.
    - id: 7
      name: Progressive Agency
      description: >
        Complexity is activated only at the level that requires it. Start
        simple, scale when needed.