apiVersion: noos.cncf.io/v1alpha2
kind: Noosystem
metadata:
  name: ""
  namespace: ""
  labels:
    sector: ""
    environment: ""
spec:
  mission: ""
  noos_level: 1
  sector: ""

  # ── Ecosystem Agents ──
  agents:
    - name: ""
      level: 1
      template: ""
      scaling:
        replicas: 1
        min_replicas: 1
        max_replicas: 1
        metric: ""
      resources:
        cpu: ""
        memory: ""
      sla:
        availability: ""

  # ── Declarative Security (Tejido T2) ──
  security:
    agent_identity: "SPIFFE"
    mTLS: true
    policies:
      agent_policies: |
        package noos.authz
        default allow = false
        allow { input.agent.level == 3 }
        allow { input.agent.level == 2; input.action in ["read", "execute"] }
        allow { input.agent.level == 1; input.action == "execute"; input.agent.name == input.target.name }
    sandbox:
      runtime: "gvisor"
      allow_network_egress: false
      readonly_rootfs: true
    compliance:
      - "OWASP Top 10 for Agentic Applications (2026)"
      - "NIST AI RMF 1.0"

  # ── Shared Services ──
  shared_services:
    vector_db:
      type: "lancedb"
      size: "10Gi"
    message_broker:
      type: "redis"
    knowledge_graph:
      type: "neo4j-community"
      size: "5Gi"
    time_series_db:
      type: "prometheus"
      retention: "90d"

  # ── Global Policies ──
  global_policies:
    trust_threshold: 0.85
    circuit_breaker:
      max_failures: 3
      window: "5m"
      cooldown: "60s"
    restart_policy: "Always"
    auto_create_agents: false

  # ── Evaluation ──
  evaluation:
    benchmark_suites:
      - name: "MCP-AgentBench"
        endpoint: ""
        frequency: "weekly"
    metrics:
      - ecosystem_uptime
      - avg_hypothesis_validation_rate
      - mean_time_to_resolution
      - total_tokens_consumed

  # ── Runtime Environment ──
  runtime:
    sandbox: ""
    observability:
      tracing: "opentelemetry"
      metrics: "prometheus"
      logs: "loki"