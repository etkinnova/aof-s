// causal_graph.proto — Probabilistic Causal Graph Schema
// AOF‑S v1.0 — Part of the ASA Architecture
//
// This schema defines the structure of the Probabilistic Causal Graph,
// which models causal relationships as conditional probability
// distributions P(Y | do(X)) rather than deterministic rules.
// Agents update these distributions through continuous reflection.

syntax = "proto3";

package aofs.world_model;

// ── Causal Graph ──
// Top-level container for a domain's causal model.
message CausalGraph {
  // Domain identifier (e.g., "ecommerce-checkout", "hospital-energy")
  string domain = 1;

  // Semantic version of the graph (e.g., "1.2.0")
  string version = 2;

  // Timestamp of last update (ISO 8601)
  string last_updated = 3;

  // Nodes representing variables in the system
  repeated CausalNode nodes = 4;

  // Edges representing causal relationships
  repeated CausalEdge edges = 5;

  // Conditional probability distributions per edge
  map<string, ProbabilityDistribution> distributions = 6;

  // Overall confidence of the agent in this causal model (0.0 to 1.0)
  double model_confidence = 7;
}

// ── Causal Node ──
// Represents a variable in the system that can be observed, controlled,
// or inferred.
message CausalNode {
  // Unique identifier (e.g., "checkout_latency_p95")
  string id = 1;

  // Human-readable name (e.g., "Checkout Latency (p95)")
  string name = 2;

  // Type of variable
  NodeType type = 3;

  // Unit of measurement (e.g., "ms", "percent", "count")
  string unit = 4;

  // Current observed or inferred value
  double current_value = 5;

  // Reference to the Unified Digital Twin fragment (Tejido T3)
  string gemelo_digital_ref = 6;

  // Description of what this variable represents
  string description = 7;

  // Tags for categorization and retrieval
  repeated string tags = 8;
}

// ── Node Type ──
enum NodeType {
  // Variable that can be directly measured
  OBSERVABLE = 0;

  // Variable that the agent can intervene on
  CONTROLLABLE = 1;

  // Variable not directly observable, must be inferred
  LATENT = 2;

  // Variable that is the target of optimization
  OBJECTIVE = 3;
}

// ── Causal Edge ──
// Represents a directed causal relationship from one node to another.
message CausalEdge {
  // Unique identifier (e.g., "edge_traffic_to_latency")
  string id = 1;

  // Source node ID (cause)
  string from = 2;

  // Target node ID (effect)
  string to = 3;

  // Type of causal edge
  EdgeType type = 4;

  // Reference to delay distribution (in delays.yaml)
  string delay_distribution = 5;

  // Human-readable description of the causal relationship
  string description = 6;

  // Order of effect (1st, 2nd, 3rd order)
  int32 effect_order = 7;
}

// ── Edge Type ──
enum EdgeType {
  // Direct causal relationship
  DIRECT = 0;

  // Part of a reinforcing loop (amplifies changes)
  REINFORCING_LOOP = 1;

  // Part of a balancing loop (stabilizes the system)
  BALANCING_LOOP = 2;
}

// ── Probability Distribution ──
// Stores the conditional probability distribution P(effect | do(cause))
// associated with a specific causal edge.
message ProbabilityDistribution {
  // Reference to the edge this distribution belongs to
  string edge_id = 1;

  // Type of probability distribution
  DistributionType type = 2;

  // Parameters of the distribution (interpretation depends on type)
  repeated double parameters = 3;

  // Agent's confidence in this estimate (0.0 to 1.0)
  double confidence = 4;

  // Timestamp of last update (ISO 8601)
  string last_updated = 5;

  // Hypothesis or episode that provided the evidence for this update
  string evidence_source = 6;

  // Number of observations used to estimate this distribution
  int32 sample_size = 7;
}

// ── Distribution Type ──
enum DistributionType {
  // Gaussian (Normal) distribution: parameters = [mean, std_dev]
  GAUSSIAN = 0;

  // Beta distribution: parameters = [alpha, beta]
  BETA = 1;

  // Empirical (histogram-based) distribution: parameters = [bin_edges..., counts...]
  EMPIRICAL = 2;

  // Poisson distribution: parameters = [lambda]
  POISSON = 3;

  // Uniform distribution: parameters = [min, max]
  UNIFORM = 4;
}