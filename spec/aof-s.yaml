apiVersion: aof-s/v1
kind: Standard
metadata:
  name: AI Orchestration Files for Systemic Agents
  version: "1.0"
  description: >
    Open standard for versionable AI orchestration files that materialize 
    the cognitive artifacts of the ASA (Adaptive Systemic Agent) architecture.
    Defines how agents are packaged, governed, and orchestrated in a 
    Local-First ecosystem.
spec:
  implements: "ASA v1.0"
  ecosystem: "Noosystem"
  description: >
    AOF‑S is the file structure standard that implements ASA agents within 
    the Noosystem digital cognitive ecosystem. It provides versionable, 
    human-readable artifacts (Markdown + YAML) with progressive context 
    loading that optimize token consumption while maintaining full 
    traceability and auditability.

  # ── Principles ──
  principles:
    - id: 0
      name: Local-First by Design
      description: >
        Local execution is the default path. Every agent must be able to 
        operate optimally without internet connectivity, using the cloud 
        only as an optional fallback. AOF‑S artifacts reside on the local 
        file system.
    - id: 1
      name: Cognitive Separation
      description: >
        Each file answers a precise cognitive question: identity, mission, 
        context, world model, memory, observations, or values.
    - id: 2
      name: Progressive Context Loading
      description: >
        The agent only loads the artifacts relevant to the current phase of 
        the ASA cycle, maintaining token usage between 2k and 12k tokens.
    - id: 3
      name: Reflexive Causal Intervention
      description: >
        Every action requires a registered hypothesis with predicted effects 
        of 1st, 2nd, and 3rd order. The agent compares predictions with 
        reality and updates its world model through continuous reflection.
    - id: 4
      name: Purposeful Cognitive Memory
      description: >
        Memory is organized into episodic, semantic, procedural, and 
        (at N3) meta-cognitive types, with mathematical mechanisms for 
        forgetting, strengthening, and consolidation.
    - id: 5
      name: Zero Trust Security by Construction
      description: >
        SPIFFE identities, mTLS, and OPA policies are integrated from the 
        design phase. Security requirements are progressive: mandatory at 
        N3, automatic at N2, minimal at N1.
    - id: 6
      name: Integrated Evaluability
      description: >
        Every agent declares evaluation metrics and benchmark suites in its 
        specification. Evaluation is a first-class lifecycle command, not an 
        afterthought.
    - id: 7
      name: Progressive Agency
      description: >
        Complexity is activated only at the level that requires it. Agents 
        start simple (N1 ultra-light with 2 files) and scale to full 
        autonomous swarms (N3) through declarative upgrades.

  # ── Levels ──
  levels:
    - level: 1
      name: Reactive
      directory: ".aof/"
      artifacts:
        - "00_manifest.yaml"
        - "01_context_static.md"
        - "02_mission.yaml"
        - "03_agent_spec.yaml"
        - "04_tasks/current_plan.md"
        - "05_skills/"
        - "06_validation_spec.md"
        - "07_observations.log"
      ultra_light:
        enabled: true
        artifacts:
          - "00_manifest.yaml"
          - "01_context_static.md"
        description: >
          Minimal agent with 2 files. Start in 5 minutes. Remaining artifacts 
          are generated on demand when upgrading to level 2.

    - level: 2
      name: Systemic
      directory: ".aof/"
      artifacts:
        - "00_manifest.yaml"
        - "01_context_static.md"
        - "02_mission.yaml"
        - "03_agent_spec.yaml"
        - "04_tasks/hypothesis.md"
        - "04_tasks/steps.md"
        - "05_world_model/variables.yaml"
        - "05_world_model/state.md"
        - "06_skills/"
        - "07_memory/episodic/"
        - "07_memory/procedural/policies.yaml"
        - "08_validation_spec.md"
        - "09_observations/feedback.yaml"
        - "09_observations/anomalies.md"
        - "10_values/constitution.md"
        - "10_values/preferences.yaml"

    - level: 3
      name: Orchestrated
      directory: ".aof/"
      artifacts:
        - "ASA.yaml"
        - "00_manifest.yaml"
        - "01_context_static.md"
        - "02_mission.yaml"
        - "03_agent_spec.yaml"
        - "04_knowledge/world_model/variables.yaml"
        - "04_knowledge/world_model/causal_graph.proto"
        - "04_knowledge/world_model/delays.yaml"
        - "04_knowledge/world_model/state.md"
        - "04_knowledge/expert_corpus/vector_store/"
        - "04_knowledge/expert_corpus/source_documents/"
        - "04_knowledge/expert_corpus/sectors/"
        - "04_knowledge/registry.yaml"
        - "04_knowledge/hypotheses/active/"
        - "04_knowledge/hypotheses/validated/"
        - "04_knowledge/hypotheses/falsified/"
        - "04_knowledge/tasks/current_steps.md"
        - "05_skills/causal_mapping_skill.md"
        - "05_skills/simulation_skill.md"
        - "05_skills/rag_skill.md"
        - "05_skills/deployment_skill.md"
        - "06_memory/episodic/"
        - "06_memory/semantic/learned_rules.yaml"
        - "06_memory/semantic/domain_facts.md"
        - "06_memory/procedural/policies.yaml"
        - "07_validation_spec.md"
        - "08_observations/feedback_log.yaml"
        - "08_observations/anomaly_notes.md"
        - "09_values/constitution.md"
        - "09_values/user_preferences.yaml"

  # ── Progressive Context Loading Matrix ──
  context_loading:
    description: >
      The agent only loads artifacts relevant to the current ASA cycle phase,
      minimizing token consumption without sacrificing analytical depth.
    phases:
      - phase: startup
        artifacts: [manifest, context_static, mission, agent_spec, state, constitution]
        tokens_approx: "2-5k"
      - phase: reason
        artifacts: [episodic (top-N), policies, variables]
        tokens_approx: "+2-3k"
      - phase: hypothesize
        artifacts: [causal_graph, delays, expert_corpus (RAG), simulation_skill]
        tokens_approx: "+3-5k"
      - phase: verify
        artifacts: [verification_rules, semantic_contracts, security_policies]
        tokens_approx: "+1-2k (N3 only)"
      - phase: execute
        artifacts: [current_steps, specific_skills]
        tokens_approx: "variable"
      - phase: evaluate
        artifacts: [feedback_log, anomaly_notes]
        tokens_approx: "+1k"
      - phase: reflect
        artifacts: [hypothesis, semantic_rules, policies, meta_cognitive (N3)]
        tokens_approx: "+2-3k"

  # ── Manifest ──
  manifest:
    name: "Noosfile"
    file: "noosfile.yaml"
    description: >
      Declarative manifest describing the desired state of a (sub)Noosystem.
      Inspired by Kubernetes and Docker Compose. Includes sections for 
      security, evaluation, and inference.
    api_version: "noos.cncf.io/v1alpha2"
    sections:
      - agents
      - security
      - shared_services
      - global_policies
      - evaluation
      - inference

  # ── CLI ──
  cli:
    name: "noctl"
    description: >
      Command-line interface for governing the full lifecycle of a Noosystem.
    commands:
      - init
      - apply
      - upgrade
      - status
      - get
      - describe
      - evaluate
      - security
      - diagnose
      - "memory compact"
      - "inference route"

  # ── Protocol Stack ──
  protocols:
    transport: "SLIM (AGNTCY)"
    syntactic: "A2A + MCP"
    semantic:
      name: "NSL (Noosystem Semantic Layer)"
      features:
        - semantic_handshake
        - trust_score
        - ontology_binding
        - learned_contracts
      bridge: "OSI"

  # ── Security ──
  security:
    identity: "SPIFFE"
    transport: "mTLS"
    policies: "OPA (declared in Noosfile)"
    defense: "Bayesian Trust Defense against memory poisoning"
    compliance:
      - "OWASP Top 10 for Agentic Applications (2026)"
      - "NIST AI RMF 1.0"
    progressive:
      level_1: "No complex security. OS-level permissions only."
      level_2: "Basic auto-configured mTLS. SPIFFE/OPA optional."
      level_3: "SPIFFE, mTLS, and OPA mandatory."

  # ── Inference (Local-First) ──
  inference:
    mode: "local_first"
    engines:
      - ollama
      - llama.cpp
      - vLLM
    fallback: "cloud (optional, configurable)"
    configuration: "ASA.yaml (inference section)"

  # ── Evaluation ──
  evaluation:
    metrics:
      - hypothesis_precision
      - falsification_rate
      - p95_latency_ms
      - avg_tokens_per_intervention
      - task_success_rate
    benchmark_suites:
      - "MCP-AgentBench"
    commands:
      - "noctl evaluate agent <name>"
      - "noctl evaluate ecosystem"

  # ── Sectors ──
  sectors:
    supported:
      - hospital
      - datacenter
      - port
      - manufacturing
      - campus
      - airport
    description: >
      The Noosystem adapts to different sectors by changing only the agent 
      library and the expert_corpus. The base architecture remains unchanged.