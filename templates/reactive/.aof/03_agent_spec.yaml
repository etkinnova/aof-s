# 03_agent_spec.yaml — Especificación del agente (Nivel 1: Reactivo)
#
# Define el rol, el modelo LLM, las herramientas permitidas y las
# restricciones operativas. La sección evaluation es opcional en N1.

role: "Senior Full-Stack Developer"
model: "claude-sonnet-4-20250514"
allowed_tools:
  - read_file
  - write_to_file
  - execute_command
constraints:
  max_parallel_actions: 3

# Evaluación (opcional en N1)
evaluation:
  metrics:
    - task_success_rate
    - avg_execution_time_sec