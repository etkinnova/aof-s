# policies.yaml — Políticas procedurales aprendidas (Nivel 2: Sistémico)
#
# El agente refina estas políticas en cada ciclo de reflexión.
# Son reglas de producción (Sistema 1) que automatizan respuestas
# ante situaciones recurrentes.

policies:
  - name: "check_index_on_latency"
    condition: "db_query_latency_p95 > 500ms"
    action: "revisar si falta índice en la tabla principal consultada"
    confidence: 0.95
    source: "H000-2026-06-07 (validated)"

  - name: "verify_staging_before_production"
    condition: "action_target == 'production'"
    action: "ejecutar paso previo en staging y validar métricas durante 15 minutos"
    confidence: 0.99
    source: "constitution.md"

  - name: "log_all_actions_for_audit"
    condition: "always"
    action: "registrar acción, hipótesis asociada y resultado en audit_log"
    confidence: 1.0
    source: "constitution.md (Gobernanza Algorítmica)"