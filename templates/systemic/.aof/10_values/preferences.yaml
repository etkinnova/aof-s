# preferences.yaml — Preferencias del usuario (Nivel 2: Sistémico)
#
# Preferencias adaptativas que el agente aprende y respeta.
# El usuario puede editarlas manualmente o el agente puede
# inferirlas de las interacciones.

preferences:
  notification: "slack"
  deploy_day: "martes-miércoles"
  preferred_language: "español"
  auto_merge_minor_changes: false