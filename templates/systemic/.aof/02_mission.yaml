# 02_mission.yaml — Misión actual del agente (Nivel 2: Sistémico)
#
# Define qué necesidad debe resolver el agente, con qué restricciones
# y cómo se medirá el éxito. Cámbiala según tu objetivo.

mission: "Reducir la latencia p95 de las consultas a la tabla orders por debajo de 50ms"
constraints:
  - "No degradar el rendimiento de escritura en más de un 10%"
  - "No bloquear la tabla durante la migración"
success_metrics:
  - "p95 de queries sobre orders < 50ms"
  - "Tiempo de escritura no superior a +10ms respecto a la línea base"
  - "Sin errores 500 en los primeros 15 minutos post‑despliegue"