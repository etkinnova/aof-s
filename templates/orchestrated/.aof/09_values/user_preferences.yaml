# user_preferences.yaml — Preferencias del usuario (Nivel 3: Orquestado)
#
# Preferencias adaptativas que el agente orquestador aprende y respeta.
# El usuario puede editarlas manualmente o el agente puede inferirlas
# de las interacciones repetidas. Se aplican en las fases de Ejecutar,
# Evaluar y Reflexionar.

preferences:
  # ── Notificaciones ──
  notification:
    channel: "slack"
    slack_channel: "#ecosystem-ops"
    mention_on_critical: true
    mention_on_degraded: false
    mention_on_success: false
    daily_digest: true
    daily_digest_time: "09:00 UTC"

  # ── Despliegue ──
  deployment:
    preferred_days: ["martes", "miércoles", "jueves"]
    avoided_days: ["viernes", "sábado", "domingo"]
    preferred_window_start: "02:00 UTC"
    preferred_window_end: "04:00 UTC"
    require_staging_validation: true
    staging_validation_minutes: 15
    auto_rollback_on_anomaly: true
    notify_before_production: true

  # ── Idioma y formato ──
  language: "español"
  timezone: "America/Havana"
  date_format: "YYYY-MM-DD"
  time_format: "HH:mm UTC"

  # ── Aprobación automática ──
  auto_approve:
    minor_changes: false               # Requiere aprobación humana
    staging_deployments: true          # Automático en staging
    index_creation: false              # Requiere aprobación humana
    configuration_changes: false       # Requiere aprobación humana
    schema_migrations: false           # Requiere aprobación humana

  # ── Umbrales de confianza ──
  thresholds:
    auto_execute_above_confidence: 0.95
    suggest_below_confidence: 0.70
    require_human_above_risk: 0.5       # Riesgo > 0.5 requiere humano

  # ── Aprendizaje ──
  learning:
    auto_compact_memory: true
    compact_threshold_tokens: 50000
    auto_archive_hypotheses: true
    archive_after_days: 30
    auto_update_causal_graph: true
    auto_refine_policies: true
    meta_cognition_enabled: true

  # ── Cumplimiento ──
  compliance:
    require_pci_dss_validation: true
    require_hipaa_validation: false
    require_iso27001_validation: false
    require_owasp_scan: true
    require_nist_rmf_logging: true
    audit_retention_days: 365

  # ── Modo operativo ──
  mode:
    default: "local_first"
    allow_cloud_fallback: false
    local_engine_priority: ["ollama", "llama.cpp"]
    cloud_fallback_conditions:
      - "local_engine_unavailable"
      - "task_requires_frontier_model"
      - "resource_exhaustion"
    max_parallel_tasks: 5

  # ── Preferencias inferidas (aprendidas de interacciones) ──
  inferred:
    preferred_explanation_detail: "detailed"    # vs "concise"
    preferred_decision_style: "cautious"        # vs "aggressive"
    max_notifications_per_hour: 10
    preferred_simulation_iterations: 1000