# registry.yaml — Tejido Conectivo del Noosistema (Nivel 3: Orquestado)
#
# Mapa vivo del ecosistema mantenido por el agente orquestador (N3).
# Contiene el registro de agentes, sus capacidades, métricas de confianza,
# topología de conocimiento y un historial de interacciones recientes.
# Los agentes de nivel 2 pueden mantener una réplica en caché (solo lectura).

registry:
  metadata:
    noosystem_id: "noos-ecommerce-prod-01"
    last_health_check: "2026-06-07T10:00:00Z"
    total_agents_registered: 6
    total_capabilities_available: 18

  # ── Agentes registrados ──
  agents:
    - id: "agent-orch-001"
      name: "ecommerce-orchestrator"
      level: 3
      sector: "e-commerce"
      status: "active"                    # active | degraded | offline | provisioning | failed
      spiffe_id: "spiffe://noos.ecommerce/agent/orchestrator-001"
      purpose: "Orquestador principal del subdominio de e-commerce."
      capabilities:
        - name: "coordinate_deployment"
          endpoint: "agent://orchestrator/coordinate_deployment"
          reliability: 0.995
        - name: "resolve_incident"
          endpoint: "agent://orchestrator/resolve_incident"
          reliability: 0.980
        - name: "ecosystem_health_check"
          endpoint: "agent://orchestrator/ecosystem_health_check"
          reliability: 0.999
      trust_score: 0.94
      last_active: "2026-06-07T10:00:00Z"
      health_endpoint: "agent://orchestrator/health"

    - id: "agent-db-002"
      name: "db-provisioner"
      level: 2
      sector: "e-commerce"
      status: "active"
      spiffe_id: "spiffe://noos.ecommerce/agent/db-provisioner"
      purpose: "Aprovisionamiento y mantenimiento de bases de datos."
      capabilities:
        - name: "create_database"
          endpoint: "agent://db-provisioner/create_database"
          reliability: 0.998
        - name: "run_migration"
          endpoint: "agent://db-provisioner/run_migration"
          reliability: 0.995
        - name: "health_check"
          endpoint: "agent://db-provisioner/health_check"
          reliability: 0.999
        - name: "consult_schema"
          endpoint: "agent://db-provisioner/consult_schema"
          reliability: 0.970
      trust_score: 0.97
      last_active: "2026-06-07T09:45:00Z"
      health_endpoint: "agent://db-provisioner/health"

    - id: "agent-sec-003"
      name: "security-scanner"
      level: 2
      sector: "e-commerce"
      status: "active"
      spiffe_id: "spiffe://noos.ecommerce/agent/security-scanner"
      purpose: "Escaneo continuo de vulnerabilidades."
      capabilities:
        - name: "scan_vulnerabilities"
          endpoint: "agent://security-scanner/scan"
          reliability: 0.992
        - name: "audit_access_logs"
          endpoint: "agent://security-scanner/audit"
          reliability: 0.985
      trust_score: 0.99
      last_active: "2026-06-07T09:50:00Z"

    - id: "agent-co-004"
      name: "checkout-optimizer"
      level: 2
      sector: "e-commerce"
      status: "active"
      spiffe_id: "spiffe://noos.ecommerce/agent/checkout-optimizer"
      purpose: "Monitorización y optimización del flujo de checkout."
      capabilities:
        - name: "optimize_checkout_flow"
          endpoint: "agent://checkout-optimizer/optimize"
          reliability: 0.960
        - name: "a_b_test"
          endpoint: "agent://checkout-optimizer/ab_test"
          reliability: 0.975
      trust_score: 0.93
      last_active: "2026-06-07T09:30:00Z"

    - id: "agent-log-005"
      name: "log-aggregator"
      level: 1
      sector: "e-commerce"
      status: "active"
      spiffe_id: "spiffe://noos.ecommerce/agent/log-aggregator"
      purpose: "Agregación y normalización de logs."
      capabilities:
        - name: "ingest_logs"
          endpoint: "agent://log-aggregator/ingest"
          reliability: 0.999
        - name: "query_logs"
          endpoint: "agent://log-aggregator/query"
          reliability: 0.997
      trust_score: 0.99
      last_active: "2026-06-07T09:59:00Z"

    - id: "agent-cache-006"
      name: "cache-warmer"
      level: 1
      sector: "e-commerce"
      status: "degraded"                  # Reportó timeouts intermitentes
      spiffe_id: "spiffe://noos.ecommerce/agent/cache-warmer"
      purpose: "Precalentamiento de cachés CDN y Redis."
      capabilities:
        - name: "warm_cache"
          endpoint: "agent://cache-warmer/warm"
          reliability: 0.920
      trust_score: 0.78                    # Bajó por estado degradado
      last_active: "2026-06-07T08:00:00Z"
      notes: "Reportó timeouts intermitentes. Orquestador investigando."

  # ── Topología de conocimiento compartido ──
  knowledge_topology:
    - name: "db-schema-snapshots"
      provider: "agent-db-002"
      consumers:
        - "agent-orch-001"
        - "agent-co-004"
        - "agent-sec-003"
      freshness: "24h"
      format: "SQL DDL + YAML"

    - name: "vulnerability-reports"
      provider: "agent-sec-003"
      consumers:
        - "agent-orch-001"
        - "agent-db-002"
      freshness: "1h"

    - name: "checkout-metrics"
      provider: "agent-co-004"
      consumers:
        - "agent-orch-001"
      freshness: "5min"

  # ── Historial de interacciones recientes ──
  interaction_log:
    - timestamp: "2026-06-07T09:00:00Z"
      from: "agent-orch-001"
      to: "agent-db-002"
      capability_invoked: "health_check"
      result: "success"
      latency_sec: 12
      human_readable_narrative: >
        El orquestador solicitó un health check al db-provisioner. 
        Respondió en 12 segundos con estado 'healthy'. Sin incidencias.

    - timestamp: "2026-06-07T08:30:00Z"
      from: "agent-orch-001"
      to: "agent-cache-006"
      capability_invoked: "warm_cache"
      result: "timeout"
      latency_sec: 45
      human_readable_narrative: >
        El orquestador solicitó un precalentamiento de caché al cache-warmer. 
        El agente no respondió en 30 segundos (timeout). Se redujo su trust_score 
        de 0.83 a 0.78 y se marcó como 'degraded'. Se recomienda investigar 
        la causa raíz en la próxima ventana de mantenimiento.

  # ── Políticas de enrutamiento del orquestador ──
  routing_policies:
    - name: "prefer-high-trust"
      description: >
        Si varios agentes proveen la misma capacidad, elegir el de mayor trust_score.
    - name: "circuit-breaker"
      description: >
        Si un agente falla 3 veces en 5 minutos, pausar invocaciones durante 60s y notificar.
    - name: "level-1-isolation"
      description: >
        Agentes de nivel 1 solo se comunican con su orquestador, nunca entre ellos directamente.
    - name: "zero-trust-enforce"
      description: >
        Toda comunicación requiere identidad SPIFFE verificable y mTLS.