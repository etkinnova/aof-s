# delays.yaml — Retardos conocidos del sistema (Nivel 3: Orquestado)
#
# Describe los retardos temporales entre una causa y su efecto.
# Cada retardo incluye una distribución de probabilidad para
# que la simulación contrafactual sea probabilística, no determinista.
# El agente actualiza estas distribuciones en cada ciclo de reflexión.

sector: "e-commerce"
last_updated: "2026-06-07T10:00:00Z"

delays:
  - name: "auto_scaling_response"
    description: >
      Tiempo que tarda el auto-scaler en añadir una nueva instancia
      tras detectar alta carga en el clúster de Kubernetes.
    distribution:
      type: "gaussian"
      parameters:
        mean: 180               # segundos (3 minutos)
        std_dev: 45             # segundos
    confidence: 0.92
    evidence_source: "H003-2026-05-10 (validated)"
    sample_size: 15

  - name: "cache_invalidation_propagation"
    description: >
      Tiempo que tarda la invalidación de caché en propagarse a todos
      los nodos CDN tras un despliegue que modifica datos cacheados.
    distribution:
      type: "gaussian"
      parameters:
        mean: 30                # segundos
        std_dev: 10             # segundos
    confidence: 0.88
    evidence_source: "H005-2026-05-12 (validated, con desviación)"
    sample_size: 8

  - name: "database_migration_lock"
    description: >
      Tiempo de bloqueo de la tabla durante una migración de esquema
      con ACCESS EXCLUSIVE lock en PostgreSQL.
    distribution:
      type: "beta"
      parameters:
        alpha: 2.0
        beta: 5.0
      # Esto modela un tiempo típicamente corto pero con cola larga
      # (bloqueos prolongados poco probables pero posibles).
    confidence: 0.85
    evidence_source: "H002-2026-06-01 (active)"
    sample_size: 4

  - name: "deployment_rollout"
    description: >
      Tiempo que tarda un despliegue en estar completamente disponible
      tras aplicar un manifiesto Kubernetes (incluye pull de imagen,
      health checks y drenaje de pods antiguos).
    distribution:
      type: "gaussian"
      parameters:
        mean: 120               # segundos (2 minutos)
        std_dev: 30             # segundos
    confidence: 0.95
    evidence_source: "H008-2026-05-20 (validated)"
    sample_size: 22

  - name: "anomaly_detection_lag"
    description: >
      Tiempo que tarda el detector de anomalías (N1) en identificar
      una desviación significativa de la línea base y publicar el evento.
    distribution:
      type: "gaussian"
      parameters:
        mean: 15                # segundos
        std_dev: 5              # segundos
    confidence: 0.90
    evidence_source: "H010-2026-05-25 (validated)"
    sample_size: 12

  - name: "reflection_cycle_duration"
    description: >
      Tiempo que tarda el propio agente orquestador en completar un
      ciclo de reflexión (fase 7 del ASA), incluyendo la actualización
      del grafo causal, la extracción de reglas y el refinamiento de políticas.
    distribution:
      type: "gaussian"
      parameters:
        mean: 45                # segundos
        std_dev: 15             # segundos
    confidence: 0.87
    evidence_source: "self_measurement (30 ciclos)"
    sample_size: 30