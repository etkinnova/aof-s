# variables.yaml — Variables observables del ecosistema (Nivel 3: Orquestado)
#
# El agente orquestador mantiene un modelo del mundo con las variables
# que monitoriza en tiempo real. Cada variable se vincula al Gemelo
# Digital Unificado (Tejido T3). Este archivo es la fuente de verdad
# para el estado actual del ecosistema.

sector: "e-commerce"
last_updated: "2026-06-07T10:00:00Z"

variables:
  # ── Latencia ──
  - name: checkout_latency_p95
    value: 780
    unit: ms
    source: "prometheus:checkout_latency_p95"
    refresh_interval: "1m"
    gemelo_digital_ref: "dg://ecommerce/checkout/latency"
    tags: ["checkout", "latency", "slo"]

  - name: search_latency_p95
    value: 45
    unit: ms
    source: "prometheus:search_latency_p95"
    refresh_interval: "1m"
    gemelo_digital_ref: "dg://ecommerce/search/latency"
    tags: ["search", "latency"]

  # ── Base de Datos ──
  - name: db_cpu_usage
    value: 65
    unit: percent
    source: "prometheus:db_cpu_usage"
    refresh_interval: "1m"
    gemelo_digital_ref: "dg://ecommerce/db/cluster-01/cpu"
    tags: ["database", "cpu", "capacity"]

  - name: db_active_connections
    value: 120
    unit: count
    source: "prometheus:db_active_connections"
    refresh_interval: "30s"
    gemelo_digital_ref: "dg://ecommerce/db/cluster-01/connections"
    tags: ["database", "connections"]

  - name: db_write_latency_p95
    value: 12
    unit: ms
    source: "prometheus:db_write_latency_p95"
    refresh_interval: "1m"
    gemelo_digital_ref: "dg://ecommerce/db/cluster-01/write-latency"
    tags: ["database", "latency", "write"]

  # ── Tráfico y Conversión ──
  - name: requests_per_minute
    value: 1200
    unit: rpm
    source: "prometheus:http_requests_per_minute"
    refresh_interval: "1m"
    gemelo_digital_ref: "dg://ecommerce/traffic/rpm"
    tags: ["traffic", "load"]

  - name: conversion_rate
    value: 3.2
    unit: percent
    source: "analytics:conversion_rate"
    refresh_interval: "5m"
    gemelo_digital_ref: "dg://ecommerce/business/conversion"
    tags: ["business", "conversion", "slo"]

  # ── Infraestructura ──
  - name: active_pods
    value: 24
    unit: count
    source: "kubernetes:active_pods"
    refresh_interval: "1m"
    gemelo_digital_ref: "dg://ecommerce/infra/pods"
    tags: ["infrastructure", "kubernetes"]

  - name: node_cpu_usage
    value: 58
    unit: percent
    source: "prometheus:node_cpu_usage"
    refresh_interval: "1m"
    gemelo_digital_ref: "dg://ecommerce/infra/nodes/cpu"
    tags: ["infrastructure", "cpu", "nodes"]

  # ── Seguridad ──
  - name: open_vulnerabilities
    value: 2
    unit: count
    source: "security-scanner:open_vulnerabilities"
    refresh_interval: "1h"
    gemelo_digital_ref: "dg://ecommerce/security/vulnerabilities"
    tags: ["security", "vulnerabilities"]

  # ── Agentes del Ecosistema ──
  - name: agents_active
    value: 6
    unit: count
    source: "registry:agents_active"
    refresh_interval: "30s"
    gemelo_digital_ref: "dg://ecommerce/agents/active"
    tags: ["agents", "ecosystem"]

  - name: avg_trust_score
    value: 0.94
    unit: score
    source: "registry:avg_trust_score"
    refresh_interval: "5m"
    gemelo_digital_ref: "dg://ecommerce/agents/trust"
    tags: ["agents", "trust", "ecosystem"]