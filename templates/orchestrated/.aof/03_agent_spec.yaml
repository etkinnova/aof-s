# 03_agent_spec.yaml — Especificación del agente (Nivel 3: Orquestado)
#
# Define el rol, el modelo LLM, las herramientas permitidas,
# las restricciones operativas, la evaluación y la configuración
# de inferencia del agente orquestador.

role: "Ecosystem Orchestrator & Causal Reasoning Engine"
model: "claude-sonnet-4-20250514"
fallback_model: "claude-haiku-4-20250514"
allowed_tools:
  - read_file
  - write_to_file
  - execute_command
  - kubectl
  - helm
  - git
  - query_prometheus
  - query_loki
  - slack_notify
constraints:
  max_parallel_actions: 5
  critical_action_requires_hypothesis: true
  critical_action_requires_human_approval:
    - "ecosystem_shutdown"
    - "agent_creation"
    - "schema_destruction"
    - "credential_rotation"

# ── Evaluación (requerida en N3) ──
evaluation:
  metrics:
    - hypothesis_precision
    - falsification_rate
    - p95_latency_ms
    - avg_tokens_per_intervention
    - ecosystem_uptime
    - mean_time_to_resolution
  benchmark_suites:
    - name: "MCP-AgentBench"
      endpoint: "https://benchmarks.example.com/mcp-agentbench/v1"
      frequency: "weekly"
  self_evaluation:
    enabled: true
    frequency: "daily"

# ── Inferencia Local‑First (Principio 0) ──
inference:
  mode: "local_first"
  local_engines:
    - name: "ollama"
      models: ["llama3.2:3b", "qwen2.5-coder:7b"]
      priority: 1
    - name: "llama.cpp"
      models: ["llama3.1-8b-Q4_K_M.gguf"]
      priority: 2
  resource_limits:
    max_vram_gb: 8
    fallback_to_cloud: false

# ── Memoria (cuádruple en N3) ──
memory:
  types:
    episodic:
      backend: "filesystem"
      location: "./06_memory/episodic/"
      retention: "90d"
    semantic:
      backend: "filesystem"
      location: "./06_memory/semantic/"
      vector_backend: "lancedb"
    procedural:
      backend: "filesystem"
      location: "./06_memory/procedural/"
    meta_cognitive:
      backend: "filesystem"
      location: "./06_memory/meta_cognitive/"
      description: >
        Almacena el rendimiento histórico de las estrategias de razonamiento
        (CoT, ToT, simulación causal, etc.) con métricas de éxito, latencia
        y dominios de aplicación.
  collective_memory:
    enabled: true
    endpoint: "memory://noos-collective/evaluations"

# ── Verificación neuro‑simbólica (N3) ──
verification:
  enabled: true
  engine: "clips"
  rules_path: "./05_skills/verification_rules.clp"
  semantic_contracts: true
  security_policies: true

# ── Meta‑cognición ──
meta_cognition:
  enabled: true
  strategies:
    - name: "chain_of_thought"
      domains: ["code_generation", "debugging", "documentation"]
      default: true
    - name: "causal_simulation"
      domains: ["infrastructure_optimization", "incident_response", "capacity_planning"]
    - name: "tree_of_thoughts"
      domains: ["architectural_planning", "multi_agent_coordination", "risk_assessment"]