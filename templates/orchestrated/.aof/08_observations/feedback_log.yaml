# feedback_log.yaml — Registro estructurado de métricas de observación (Nivel 3: Orquestado)
#
# El agente orquestador registra aquí las métricas recolectadas tras cada
# intervención, para compararlas con la hipótesis formulada.
# Incluye trazabilidad para la Gobernanza Algorítmica (Tejido T1).

observations:
  # ── Hipótesis H000: pico de latencia en /search ──
  - timestamp: "2026-06-07 09:05:00Z"
    metric: db_query_latency_p95
    value: 45
    unit: ms
    hypothesis: "H000-2026-06-07"
    result: "validated"
    deviation: 0
    notes: "Índice idx_products_name añadido. Latencia restaurada a rango normal."

  - timestamp: "2026-06-07 09:05:00Z"
    metric: db_write_latency_p95
    value: 12
    unit: ms
    hypothesis: "H000-2026-06-07"
    result: "within_range"
    deviation: "+2ms respecto a línea base (10ms)"
    notes: "Ligero aumento en escritura por mantenimiento del nuevo índice."

  # ── Hipótesis H012: optimización de índices en orders ──
  - timestamp: "2026-06-07 10:15:00Z"
    metric: checkout_latency_p95
    value: 510
    unit: ms
    hypothesis: "H012-2026-06-07"
    result: "validated"
    deviation: "+30ms sobre predicción (480ms)"
    notes: >
      El índice parcial en orders(status) redujo la latencia de 780ms a 510ms.
      No se alcanzó el objetivo de 500ms, pero la mejora es significativa (34.6%).
      Se recomienda investigar optimizaciones adicionales (pooling, particionamiento).

  - timestamp: "2026-06-07 10:15:00Z"
    metric: db_write_latency_p95
    value: 18
    unit: ms
    hypothesis: "H012-2026-06-07"
    result: "validated"
    deviation: "+3ms sobre predicción (+5ms)"
    notes: "Impacto en escritura menor del previsto. Índice eficiente."

  - timestamp: "2026-06-07 10:15:00Z"
    metric: conversion_rate
    value: 3.21
    unit: percent
    hypothesis: "H012-2026-06-07"
    result: "within_range"
    deviation: "+0.03% sobre baseline (3.18%)"
    notes: "Ligera mejora en conversión, posiblemente por menor latencia en checkout."

  # ── Anomalía: timeouts del cache-warmer ──
  - timestamp: "2026-06-07 08:30:00Z"
    metric: cache_warm_latency
    value: 45000
    unit: ms
    hypothesis: null
    result: "anomaly"
    deviation: "timeout (umbral: 30000ms)"
    notes: >
      Timeout del cache-warmer durante precalentamiento post-despliegue.
      Se redujo trust_score de 0.83 a 0.78. Investigación en curso.

  # ── Evento de despliegue ──
  - timestamp: "2026-06-07 02:15:00Z"
    metric: deployment_rollout_duration
    value: 135
    unit: s
    hypothesis: "H011-2026-06-06"
    result: "validated"
    deviation: "+15s sobre predicción (120s)"
    notes: "Despliegue completado dentro del margen esperado. Sin incidencias."

  # ── Métricas agregadas del ecosistema ──
